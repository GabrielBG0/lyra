<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Lyra — Social Preview</title>
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Noto+Serif:ital,wght@0,400;0,500;1,400;1,500&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        padding: 0;
        background: #0a0a0a;
        font-family:
          "Satoshi",
          -apple-system,
          BlinkMacSystemFont,
          "Helvetica Neue",
          sans-serif;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      /* Stage centers the card in any viewport */
      .stage {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      /* Fixed export size — 1280×640 */
      .card {
        position: relative;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background: radial-gradient(
          ellipse 90% 70% at 30% 30%,
          oklch(0.2 0.018 60) 0%,
          oklch(0.12 0.01 60) 60%,
          oklch(0.09 0.008 60) 100%
        );
        color: oklch(0.95 0.013 85);
        letter-spacing: -0.002em;
      }

      /* Star field — denser than the desktop, scaled for the social card */
      .stars {
        position: absolute;
        inset: 0;
        pointer-events: none;
        background-image:
          radial-gradient(
            1.4px 1.4px at 6% 18%,
            oklch(0.85 0.05 80 / 0.55) 50%,
            transparent
          ),
          radial-gradient(
            1px 1px at 14% 72%,
            oklch(0.85 0.05 80 / 0.4) 50%,
            transparent
          ),
          radial-gradient(
            1.2px 1.2px at 22% 34%,
            oklch(0.85 0.05 80 / 0.45) 50%,
            transparent
          ),
          radial-gradient(
            0.8px 0.8px at 30% 88%,
            oklch(0.85 0.05 80 / 0.3) 50%,
            transparent
          ),
          radial-gradient(
            1.6px 1.6px at 41% 14%,
            oklch(0.92 0.06 80 / 0.65) 50%,
            transparent
          ),
          radial-gradient(
            0.9px 0.9px at 48% 62%,
            oklch(0.85 0.05 80 / 0.35) 50%,
            transparent
          ),
          radial-gradient(
            1px 1px at 58% 46%,
            oklch(0.85 0.05 80 / 0.4) 50%,
            transparent
          ),
          radial-gradient(
            0.8px 0.8px at 67% 84%,
            oklch(0.85 0.05 80 / 0.3) 50%,
            transparent
          ),
          radial-gradient(
            1.2px 1.2px at 76% 22%,
            oklch(0.85 0.05 80 / 0.45) 50%,
            transparent
          ),
          radial-gradient(
            0.9px 0.9px at 84% 56%,
            oklch(0.85 0.05 80 / 0.35) 50%,
            transparent
          ),
          radial-gradient(
            1.6px 1.6px at 92% 78%,
            oklch(0.92 0.06 80 / 0.6) 50%,
            transparent
          ),
          radial-gradient(
            0.8px 0.8px at 96% 10%,
            oklch(0.85 0.05 80 / 0.3) 50%,
            transparent
          ),
          radial-gradient(
            0.9px 0.9px at 11% 92%,
            oklch(0.85 0.05 80 / 0.35) 50%,
            transparent
          ),
          radial-gradient(
            0.9px 0.9px at 53% 6%,
            oklch(0.85 0.05 80 / 0.3) 50%,
            transparent
          );
      }

      /* Soft amber bloom in the upper-right where Vega lives */
      .bloom {
        position: absolute;
        width: 520px;
        height: 520px;
        right: -60px;
        top: -120px;
        background: radial-gradient(
          circle,
          oklch(0.72 0.1 55 / 0.18) 0%,
          transparent 60%
        );
        filter: blur(20px);
        pointer-events: none;
      }

      /* Inner safe area — GitHub recommends ~40pt margin */
      .frame {
        position: absolute;
        inset: 56px 64px;
        display: grid;
        grid-template-columns: 1.05fr 1fr;
        gap: 48px;
        align-items: center;
      }

      /* ── Left column: text ─────────────────────────────── */
      .left {
        display: flex;
        flex-direction: column;
        gap: 0;
        min-width: 0;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
        margin-bottom: 28px;
      }
      .brand__name {
        font-size: 18px;
        font-weight: 600;
        color: oklch(0.95 0.013 85);
        letter-spacing: 0.18em;
        text-transform: uppercase;
      }
      .brand__sep {
        width: 1px;
        height: 14px;
        background: oklch(0.32 0.012 60 / 0.6);
      }
      .brand__tag {
        font-size: 11px;
        font-weight: 600;
        color: oklch(0.55 0.01 75);
        letter-spacing: 0.16em;
        text-transform: uppercase;
        font-variant-numeric: tabular-nums;
      }

      .headline {
        font-family: "Noto Serif", Georgia, serif;
        font-size: 76px;
        line-height: 1.02;
        font-weight: 400;
        color: oklch(0.95 0.013 85);
        letter-spacing: 2px;
        margin: 0 0 22px;
        text-wrap: balance;
      }
      .headline em {
        font-style: italic;
        color: oklch(0.78 0.1 55);
      }

      .sub {
        font-size: 19px;
        line-height: 1.45;
        color: oklch(0.78 0.013 80);
        max-width: 560px;
        margin: 0 0 36px;
        letter-spacing: -0.003em;
        text-wrap: pretty;
      }

      .meta {
        display: flex;
        align-items: center;
        gap: 18px;
        font-size: 12px;
        font-weight: 600;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: oklch(0.55 0.01 75);
      }
      .meta__item {
        display: inline-flex;
        align-items: center;
        gap: 8px;
      }
      .meta__dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: oklch(0.72 0.1 55);
        box-shadow: 0 0 8px oklch(0.72 0.1 55 / 0.7);
      }
      .meta__sep {
        width: 4px;
        height: 4px;
        border-radius: 50%;
        background: oklch(0.4 0.008 70);
        opacity: 0.7;
      }

      /* ── Right column: constellation mark ──────────────── */
      .right {
        position: relative;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      .constellation {
        position: relative;
        width: 460px;
        height: 460px;
      }

      /* Faint orbit ring for depth */
      .ring {
        position: absolute;
        border-radius: 50%;
        border: 0.5px solid oklch(0.32 0.012 60 / 0.45);
      }
      .ring--1 {
        inset: 30px;
      }
      .ring--2 {
        inset: 80px;
        border-color: oklch(0.32 0.012 60 / 0.3);
      }
      .ring--3 {
        inset: 140px;
        border-color: oklch(0.32 0.012 60 / 0.18);
      }

      .constellation svg {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        overflow: visible;
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="card">
        <div class="stars"></div>
        <div class="bloom"></div>

        <div class="frame">
          <!-- LEFT -->
          <div class="left">
            <div class="brand">
              <span class="brand__name">Lyra</span>
              <span class="brand__sep"></span>
              <span class="brand__tag">A vault for songwriters</span>
            </div>

            <h1 class="headline">
              Every line you<br />
              will <em>write.</em>
            </h1>

            <p class="sub">
              A local-first lyric workspace with version history, in-line
              revisions, and quiet typography for the work that matters.
            </p>

            <div class="meta">
              <span class="meta__item">
                <span class="meta__dot"></span>
                Desktop
              </span>
              <span class="meta__sep"></span>
              <span class="meta__item">Open source</span>
              <span class="meta__sep"></span>
              <span class="meta__item">MIT</span>
            </div>
          </div>

          <!-- RIGHT — constellation mark -->
          <div class="right">
            <div class="constellation">
              <div class="ring ring--3"></div>
              <div class="ring ring--2"></div>
              <div class="ring ring--1"></div>

              <svg viewBox="0 0 28 28" fill="none">
                <defs>
                  <filter
                    id="vega-glow"
                    x="-100%"
                    y="-100%"
                    width="300%"
                    height="300%"
                  >
                    <feGaussianBlur stdDeviation="0.9" />
                  </filter>
                  <filter
                    id="star-soft"
                    x="-50%"
                    y="-50%"
                    width="200%"
                    height="200%"
                  >
                    <feGaussianBlur stdDeviation="0.18" />
                  </filter>
                </defs>

                <!-- Constellation lines -->
                <g
                  stroke="#b0864f"
                  stroke-width="0.18"
                  stroke-linejoin="round"
                  stroke-linecap="round"
                  opacity="0.85"
                >
                  <path
                    d="M4.3 19.88 L9.82 20.03 L17.46 10.4 L12.23 10.06 L4.3 19.88 Z"
                  />
                  <path d="M22.8 9.12 L19.98 5.28 L17.46 10.4 L22.8 9.12 Z" />
                </g>

                <!-- Stars (cream) -->
                <g fill="#FCE7C1" filter="url(#star-soft)">
                  <circle cx="4.3" cy="20.25" r="0.55" />
                  <circle cx="9.83" cy="20.40" r="0.55" />
                  <circle cx="12.23" cy="10.06" r="0.48" />
                  <circle cx="17.46" cy="10.40" r="0.48" />
                  <circle cx="19.97" cy="5.28" r="0.48" />
                </g>

                <!-- Vega — brightest, with amber bloom -->
                <circle
                  cx="22.83"
                  cy="9.12"
                  r="3.2"
                  fill="#FFBB41"
                  opacity="0.18"
                  filter="url(#vega-glow)"
                />
                <circle
                  cx="22.83"
                  cy="9.12"
                  r="1.7"
                  fill="#FFBB41"
                  opacity="0.32"
                  filter="url(#vega-glow)"
                />
                <circle cx="22.83" cy="9.12" r="0.95" fill="#FCE7C1" />
              </svg>
            </div>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
