name: Update Version Files

permissions: {}

on:
  pull_request:
    branches: [main]
    paths:
      - "package.json"

jobs:
  update:
    name: Sync version files
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'GabrielBG0'
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.head_ref }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: ver
        run: echo "version=$(jq -r .version package.json)" >> $GITHUB_OUTPUT

      - name: Update Cargo.toml
        run: |
          sed -i 's/^version = "[^"]*"/version = "${{ steps.ver.outputs.version }}"/' src-tauri/Cargo.toml

      - name: Update tauri.conf.json
        run: |
          jq --arg v "${{ steps.ver.outputs.version }}" '.version = $v' src-tauri/tauri.conf.json > tmp.json
          mv tmp.json src-tauri/tauri.conf.json

      - name: Update Cargo.lock
        run: |
          VERSION="${{ steps.ver.outputs.version }}"
          sed -i "/^name = \"lyra\"$/{n; s/^version = \"[^\"]*\"/version = \"${VERSION}\"/}" src-tauri/Cargo.lock

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src-tauri/Cargo.toml src-tauri/tauri.conf.json src-tauri/Cargo.lock
          if git diff --cached --quiet; then
            echo "Versions already in sync."
          else
            git commit -m "chore: sync version to ${{ steps.ver.outputs.version }}"
            git push
          fi
